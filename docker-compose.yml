services:
  mysql:
    image: mysql:8.4
    container_name: workmate-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-workmate_root_password}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-workmate_ai}
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "${MYSQL_HOST_PORT:-3306}:3306"
    volumes:
      - workmate_mysql_data:/var/lib/mysql
      - ./backend/src/main/resources/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./backend/src/main/resources/db/data.sql:/docker-entrypoint-initdb.d/02-data.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  redis:
    image: redis:7.4-alpine
    container_name: workmate-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    volumes:
      - workmate_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend
    container_name: workmate-backend
    restart: unless-stopped
    environment:
      DB_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-workmate_ai}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
      DB_USERNAME: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:-workmate_root_password}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DATABASE: ${REDIS_DATABASE:-0}
      REDIS_TIMEOUT: ${REDIS_TIMEOUT:-2s}
      WORKMATE_LLM_PROVIDER: ${DOCKER_WORKMATE_LLM_PROVIDER:-mock}
      WORKMATE_LLM_MODEL: ${DOCKER_WORKMATE_LLM_MODEL:-mock-llm}
      DEEPSEEK_BASE_URL: ${DOCKER_DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      DEEPSEEK_API_KEY: ${DOCKER_DEEPSEEK_API_KEY:-}
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "${BACKEND_HOST_PORT:-8080}:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: workmate-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_HOST_PORT:-80}:80"
    depends_on:
      - backend

volumes:
  workmate_mysql_data:
  workmate_redis_data:
